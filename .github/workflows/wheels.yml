name: Build and publish wheels

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-tag:
    name: Check tag correctness
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    steps:
      - uses: actions/checkout@v4
      - run: |
          version=$(grep -E '^version\s*=' pyproject.toml | sed -E 's/^version\s*=\s*"([^"]+)".*/\1/')

          tag="${GITHUB_REF_NAME}"

          echo "Detected version in pyproject.toml: $version"
          echo "Detected tag name: $tag"

          # Compare them
          if [ "$version" != "$tag" ]; then
            echo "❌ Tag ($tag) does not match version in pyproject.toml ($version)"
            exit 1
          fi

          echo "✅ Tag matches version. Proceeding with release..."

  # -----------------------------------------------------------------------
  # Non-PGO binary wheels
  #
  # These targets cannot easily run a native profiling workload (cross-
  # compiled architectures, musl libc, 32-bit) so they use a plain
  # release build.
  # -----------------------------------------------------------------------
  binary:
    needs: [check-tag]
    name: build on ${{ matrix.os }} (${{ matrix.target }}) (${{ matrix.manylinux || 'auto' }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # manylinux — less-common architectures (no native CI runners)
          - os: linux
            target: x86
          - os: linux
            target: armv7
          - os: linux
            target: ppc64le
          - os: linux
            target: s390x

          # musllinux — cross-compiled; PGO not practical
          - os: linux
            target: x86_64
            manylinux: musllinux_1_2
          - os: linux
            target: x86
            manylinux: musllinux_1_2
          - os: linux
            target: aarch64
            manylinux: musllinux_1_2
          - os: linux
            target: armv7
            manylinux: musllinux_1_2

          # Windows 32-bit (no native x86 runner for profiling)
          - os: windows
            python-architecture: x86
            target: x86

          # macOS x86_64 — GitHub's macOS runners are now Apple Silicon,
          # so we can't natively run an x86_64 binary to collect a profile.
          - os: macos
            target: x86_64

    runs-on: ${{ (matrix.os == 'linux' && 'ubuntu') || matrix.os }}-latest
    steps:
      - uses: actions/checkout@v4
      # Older Python versions are missing from 32-bit windows runners
      - uses: actions/setup-python@v5
        if: ${{ matrix.os == 'windows' && matrix.python-architecture == 'x86' }}
        with:
          python-version: |
            3.10
            3.11
            3.12
          architecture: x86
      # Some Python versions missing from all windows runners
      - uses: actions/setup-python@v5
        if: ${{ matrix.os == 'windows'}}
        with:
          python-version: |
            3.13
            3.13t
            3.14
            3.14t
          architecture: "${{ matrix.python-architecture || 'x64' }}"
      - name: Generate third-party license information
        run: |
          cargo install cargo-3pl --version 0.1.3
          cargo 3pl > LICENSE-THIRD-PARTY
      - name: build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --strip --out dist --interpreter '3.10 3.11 3.12 3.13 3.14 3.13t 3.14t'
          manylinux: ${{ matrix.manylinux || 'auto' }}
          sccache: "true"
          rust-toolchain: "1.93"
      - run: pip install -U twine packaging
      - run: twine check --strict dist/*
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-binary-${{ matrix.os }}-${{ matrix.target }}-${{ matrix.manylinux || 'auto' }}
          path: dist/*

  # -----------------------------------------------------------------------
  # PGO-optimized binary wheels
  #
  # For platforms where we can run a native profiling workload:
  #   - Linux x86_64   (ubuntu-latest)
  #   - Linux aarch64  (ubuntu-24.04-arm)
  #   - Windows x86_64 (windows-latest)
  #   - macOS aarch64  (macos-latest — Apple Silicon)
  #
  # The composite action handles the three-phase build:
  #   instrument → profile → optimize
  # -----------------------------------------------------------------------
  build-pgo:
    needs: [check-tag]
    name: PGO build on ${{ matrix.platform.os }} (${{ matrix.platform.target }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: linux
            target: x86_64
            runs-on: ubuntu-latest
            manylinux: auto
          - os: linux
            target: aarch64
            runs-on: ubuntu-24.04-arm
            manylinux: auto
          - os: windows
            target: x86_64
            runs-on: windows-latest
            manylinux: ""
          - os: macos
            target: aarch64
            runs-on: macos-latest
            manylinux: ""

    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install Rust with LLVM tools
        id: rust-toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"
          components: llvm-tools

      - name: Generate third-party license information
        shell: bash
        run: |
          cargo install cargo-3pl --version 0.1.3
          cargo 3pl > LICENSE-THIRD-PARTY

      - name: Build PGO-optimized wheels
        uses: ./.github/actions/build-pgo-wheel
        with:
          interpreter: "3.10 3.11 3.12 3.13 3.14 3.13t 3.14t"
          profile-interpreter: "3.12"
          rust-toolchain: ${{ steps.rust-toolchain.outputs.name }}
          manylinux: ${{ matrix.platform.manylinux }}

      - run: pip install -U twine packaging
      - run: twine check --strict dist/*

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-pgo-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: dist/*

  pure-python:
    needs: [check-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install -U twine packaging build
      - name: Build source distribution
        run: |
          python -m build --sdist --outdir dist
      - name: Build pure Python wheel
        run: |
          python -m build --wheel --outdir dist
        env:
          WHENEVER_NO_BUILD_RUST_EXT: 1
      - run: twine check --strict dist/*
      - name: Upload pure Python wheels and sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-pure-python
          path: dist/*

  release:
    name: Release
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    needs: [binary, build-pgo, pure-python]
    steps:
      - uses: actions/download-artifact@v4
      - run: pip install -U twine packaging
      - name: Publish to PyPI
        run: |
          twine upload --non-interactive --disable-progress-bar --skip-existing wheels-*/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

